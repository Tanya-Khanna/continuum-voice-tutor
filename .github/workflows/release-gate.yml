name: Release gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Secret-free clean clone
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out committed source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install verifier dependencies
        run: npm ci

      - name: Verify the distributable archive
        run: npm run verify:fresh
